name: Trigger auto deployment for pwc-task

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/pwc-task-AutoDeployTrigger-59c6e662-4a0e-4625-ad33-3698c0cab52d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PWCTASK_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PWCTASK_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PWCTASK_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: pwctaskacr.azurecr.io
          registryUsername: ${{ secrets.PWCTASK_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PWCTASK_REGISTRY_PASSWORD }}
          containerAppName: pwc-task
          resourceGroup: rg-pwc-task
          imageToBuild: pwctaskacr.azurecr.io/pwc-task:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


